name: TableCheck 预约监控

# JST = UTC+9
#   11:01 JST = 02:01 UTC
#   11:10 JST = 02:10 UTC
#   12:01 JST = 03:01 UTC
#   12:10 JST = 03:10 UTC
on:
  schedule:
    - cron: '1 2 * * *'
    - cron: '10 2 * * *'
    - cron: '1 3 * * *'
    - cron: '10 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: 运行抓取脚本
        run: python scraper.py

      - name: 提交数据到仓库
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master
          # 分路径 add，防止某个目录不存在导致整批失败
          git add availability_log.csv 2>/dev/null || true
          git add screenshots/         2>/dev/null || true
          git add api_dumps/           2>/dev/null || true
          git add html_dumps/          2>/dev/null || true
          # 有变更才提交
          if git diff --staged --quiet; then
            echo "无新数据，跳过提交"
          else
            git commit -m "数据更新 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
            git push
          fi
